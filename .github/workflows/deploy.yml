# =============================================================================
# CI/CD Pipeline — Build, Push & Deploy
# =============================================================================
# Trigger: push to the `main` branch.
#
# Job 1 — build-and-push:
#   1. Check out the repository.
#   2. Log in to Docker Hub using repository secrets (DOCKER_USERNAME, DOCKER_PASSWORD).
#   3. Build the multi-stage Docker image and tag it with:
#        - the short git SHA (e.g., `portfolio:a1b2c3d`)
#        - `latest`
#   4. Push both tags to Docker Hub.
#
# Job 2 — deploy:
#   1. SSH into the EC2 instance using the SSH_PRIVATE_KEY secret.
#   2. Pull the newly pushed image from Docker Hub.
#   3. Run `docker compose up -d --force-recreate` to restart the container.
#   4. Prune dangling images to reclaim disk space.
#
# Required GitHub Secrets:
#   DOCKER_USERNAME      — Docker Hub username
#   DOCKER_PASSWORD      — Docker Hub password or access token
#   EC2_HOST             — Public IP or DNS of the EC2 instance
#   EC2_USER             — SSH user (typically `ubuntu` or `ec2-user`)
#   SSH_PRIVATE_KEY      — Contents of the private key (PEM) for EC2 access
# =============================================================================

name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/portfolio

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: echo "sha=${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.tags.outputs.sha }}
            ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== Pulling latest image ==="
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio:latest

            echo "=== Restarting container ==="
            cd ~/portfolio
            docker compose up -d --force-recreate --remove-orphans

            echo "=== Pruning unused images ==="
            docker image prune -af --filter "until=24h"

            echo "=== Deployment complete ==="
