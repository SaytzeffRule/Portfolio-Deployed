# =============================================================================
# CI/CD Pipeline — Build, Push & Deploy
# =============================================================================
# Trigger: push to the `main` branch.
#
# Job 1 — build-and-push:
#   1. Check out the repository.
#   2. Log in to Docker Hub using repository secrets (DOCKER_USERNAME, DOCKER_PASSWORD).
#   3. Build the multi-stage Docker image and tag it with:
#        - the short git SHA (e.g., `portfolio:a1b2c3d`)
#        - `latest`
#   4. Push both tags to Docker Hub.
#
# Job 2 — deploy:
#   1. SSH into the EC2 instance using the SSH_PRIVATE_KEY secret.
#   2. Pull the newly pushed image from Docker Hub.
#   3. Run `docker compose up -d --force-recreate` to restart the container.
#   4. Prune dangling images to reclaim disk space.
#
# Required GitHub Secrets:
#   DOCKER_USERNAME      — Docker Hub username
#   DOCKER_PASSWORD      — Docker Hub password or access token
#   EC2_HOST             — Public IP or DNS of the EC2 instance
#   EC2_USER             — SSH user (typically `ubuntu` or `ec2-user`)
#   SSH_PRIVATE_KEY      — Contents of the private key (PEM) for EC2 access
# =============================================================================

name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/resume-site:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/resume-site:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/resume-site:latest

            docker stop resume-site || true
            docker rm resume-site || true

            docker run -d \
              --name resume-site \
              -p 80:80 \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/resume-site:latest
