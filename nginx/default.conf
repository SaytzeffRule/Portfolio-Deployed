# Nginx configuration for serving the built React portfolio app.
#
# Key design decisions:
#   - Gzip compression is enabled for text-based assets (HTML, JS, CSS, SVG, JSON).
#   - Static assets with content hashes in their filenames are cached aggressively (1 year).
#   - HTML is never cached by the browser so updates are picked up immediately.
#   - A /health endpoint returns 200 so Docker HEALTHCHECK and AWS target groups can
#     verify the container is serving traffic correctly.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ------------------------------------------------------------------
    # Static assets with content hash in filename → cache for 1 year
    # These are files emitted by Vite with hashes (e.g., index.a1b2c3.js).
    # ------------------------------------------------------------------
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        add_header Cache-Control "public, immutable, max-age=31536000";
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # HTML — never cache so users get the latest version immediately
    # ------------------------------------------------------------------
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;  # SPA fallback — all routes serve index.html
    }

    # ------------------------------------------------------------------
    # Health check endpoint
    # ------------------------------------------------------------------
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # ------------------------------------------------------------------
    # Deny access to dotfiles (.env, .git, etc.)
    # ------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
